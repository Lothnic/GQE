# base.yaml — 250M parameter model / 30B token paper configuration
# All values are cited or noted if UNSPECIFIED

model:
  d_model: 1024              # [UNSPECIFIED] — typical hidden size for 250M parameter scale
  n_layers: 16               # [UNSPECIFIED] — typical depth for 250M parameter scale  
  n_query_heads: 16          # §4.1 — "16-query-head"
  n_kv_heads: 8              # §4.1 — "8-KV-head"
  d_head: 64                 # [ASSUMPTION] — d_model / n_query_heads
  d_ff: 4096                 # [UNSPECIFIED] — typical 4x scaling of d_model
  vocab_size: 50257          # [UNSPECIFIED] — standard GPT-2 tokenizer vocabulary size
  max_seq_len: 2048          # §4.1, Table 1 — "Sequence length: 2048"
  
gqe:
  top_k: 1                   # §4.1 — "k=1 active expert per group"
  # Table 2 variants: "full" | "hard_only" | "weighted_no_renorm"
  # "full" = renorm weighted-sum slot + shared head (paper main result)
  variant: full
  # Shared-head KV: "group_0" (default, preserves GQA cache) | "dedicated" | "mean"
  shared_kv_policy: group_0
  aux_loss_coeff: 0.01       # [UNSPECIFIED] — standard load-balancing auxiliary loss coefficient

training:
  optimizer: adamw            # §4.1, Table 1 — "Fused AdamW"
  beta1: 0.9                  # §4.1, Table 1
  beta2: 0.95                 # §4.1, Table 1
  epsilon: 1.0e-7             # §4.1, Table 1
  lr_schedule: wsd            # §4.1, Table 1 — "WSD"
  max_lr: 5.0e-4              # §4.1, Table 1 — "Maximum learning rate: 1x10^-5 to 5x10^-4"
  warmup_tokens: 3_000_000_000 # §4.1, Table 1 — "3 billion tokens (3BT)"
  weight_decay: 0.1           # §4.1, Table 1 — "Weight decay: 0.1"
  total_tokens: 30_000_000_000 # §4.1 — "30B tokens"
  global_batch_tokens: 1_050_000 # §4.1, Table 1 — "Global batch size: 1.05 million tokens"
  precision: bf16             # §4.1, Table 1 — "Mixed precision BFloat16"
  use_zclip: true             # §4.1 — "employ ZClip [15]"

data:
  dataset: "HuggingFaceFW/fineweb-edu" # §4.1 — "FineWeb-Edu"
  streaming: true
