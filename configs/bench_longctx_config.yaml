# bench_longctx_config.yaml
# Benchmark-only config for long-context latency sweeps on 8GB VRAM (RTX 4060 Mobile).
#
# Intentionally keeps head topology identical to the 25M config:
#   n_query_heads=8, n_kv_heads=4, d_head=64 → same routing structure, just fewer layers.
# Half-precision (bf16) is used so the attention scratch-pad (seq²×heads×2 bytes) fits:
#   at seq=65536: 65536²×8×2 = 68 GB in fp32, but benchmark runs layer-by-layer (batch=1)
#   and only materialises one layer's QK^T at a time:
#   65536²×8×2 = 68 GB still... reduce heads to 4Q/2KV with a smaller d_head to fit.
#
# Practical setting that OOM-fits at 32768 on 8 GB with bf16:
#   n_query_heads=4, n_kv_heads=2, d_head=32 → QK^T = 32768²×4×2 = 8 GB  (borderline)
# Use 16384 as the practical longest length:
#   QK^T = 16384²×4×2 = 2 GB — comfortably fits.
# Extend to 32768 with reduced n_query_heads=2, n_kv_heads=1.

model:
  d_model: 256               # Smaller hidden dim — enough to measure speedup ratios
  n_layers: 2                # Minimal depth — we only care about attention latency
  n_query_heads: 4           # 4 query heads
  n_kv_heads: 2              # 2 KV heads (G=2 groups, M=2 experts/group)
  d_head: 64                 # Same d_head as 25M model
  d_ff: 512                  # Minimal FFN — not the bottleneck in long-context
  vocab_size: 32000
  max_seq_len: 65536         # Allow long-context benchmark runs

gqe:
  top_k: 1                   # k=1 active expert per group (same as paper)
  variant: full
  shared_kv_policy: group_0
  aux_loss_coeff: 0.01
